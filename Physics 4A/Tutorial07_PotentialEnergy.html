<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics 4A · Tutorial 7: Potential Energy and Conservation of Energy — Animated Worked Examples</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
  :root{
    --paper:#FAF6EE; --ink:#2B2317; --accent:#B5793B; --accent-dk:#8A5A24;
    --board:#2F4538; --chalk:#F2EEDC; --red:#C0392B; --blue:#2E6DA4; --green:#2E7D4F; --purple:#7B4FA0;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Georgia,'Times New Roman',serif;background:#EFE7D8;color:var(--ink)}
  header{background:var(--board);color:var(--chalk);padding:14px 22px 10px}
  header h1{margin:0;font-size:1.25rem;font-weight:normal;letter-spacing:.5px}
  header .sub{font-size:.85rem;opacity:.75;margin-top:2px}
  nav{display:flex;gap:8px;padding:10px 22px;background:#25382D;flex-wrap:wrap}
  nav button{font-family:inherit;font-size:.85rem;padding:6px 14px;border-radius:18px;border:1px solid #4a6353;
    background:transparent;color:var(--chalk);cursor:pointer;transition:.2s}
  nav button:hover{background:#3a5245}
  nav button.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .wrap{display:grid;grid-template-columns:250px 1fr;gap:16px;padding:16px 22px;max-width:1460px;margin:0 auto}
  /* ---- professor column ---- */
  .prof-col{display:flex;flex-direction:column;gap:10px}
  .bubble{position:relative;background:#fff;border:2px solid var(--accent-dk);border-radius:14px;
    padding:12px 14px;min-height:110px;font-size:.95rem;line-height:1.45;box-shadow:2px 3px 0 rgba(0,0,0,.08)}
  .bubble:after{content:'';position:absolute;bottom:-14px;left:38px;border:8px solid transparent;
    border-top-color:var(--accent-dk)}
  /* highlighted link to the next example, shown when an example finishes */
  .next-link{display:inline-block;margin-top:10px;padding:7px 14px;background:var(--accent);color:#fff;
    border-radius:8px;cursor:pointer;font-weight:bold;font-size:.9rem;box-shadow:0 2px 6px rgba(0,0,0,.18);
    animation:pulseLink 1.6s ease-in-out infinite}
  .next-link:hover{background:var(--accent-dk)}
  @keyframes pulseLink{0%,100%{box-shadow:0 2px 6px rgba(0,0,0,.18)}
    50%{box-shadow:0 0 16px 3px rgba(181,121,59,.75)}}
  .prof-box{background:linear-gradient(#3A5546,#2F4538);border-radius:14px;padding:6px;display:flex;justify-content:center}
  /* ---- stage & board ---- */
  .main-col{display:flex;flex-direction:column;gap:12px;min-width:0}
  .prompt{background:#fff;border-left:5px solid var(--accent);padding:10px 14px;font-size:.92rem;
    border-radius:0 8px 8px 0;box-shadow:1px 2px 0 rgba(0,0,0,.06)}
  .prompt .simlink{display:inline-block;background:#2E6DA4;color:#fff;font-size:.78rem;font-weight:bold;
    padding:3px 12px;border-radius:12px;text-decoration:none;margin-left:8px;vertical-align:1px}
  .prompt .simlink:hover{background:#1D4568}
  .prompt .diff{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:10px;color:#fff;
    margin-left:8px;vertical-align:middle;letter-spacing:.5px}
  .diff.basic{background:var(--green)} .diff.intermediate{background:var(--blue)} .diff.challenging{background:var(--red)}
  .diff.review{background:#7B4FA0}
  /* stage and chalkboard sit SIDE BY SIDE so both are visible without scrolling */
  .stage-row{display:flex;gap:12px;align-items:stretch;min-height:0}
  #stagebox{flex:0 0 55%;min-width:0;background:var(--paper);border-radius:12px;border:1px solid #D9CDB4;
    box-shadow:1px 2px 0 rgba(0,0,0,.06);align-self:flex-start}
  #stage{width:100%;height:auto;display:block}
  #boardwrap{flex:1;min-width:0;background:var(--board);border-radius:12px;padding:12px 14px;
    max-height:540px;overflow-y:auto;overflow-x:auto;box-shadow:inset 0 0 30px rgba(0,0,0,.25)}
  #board .line{color:var(--chalk);margin:9px 0;font-size:1.26rem;opacity:0;transform:translateY(4px);
    transition:opacity .5s,transform .5s}
  #board .katex{font-size:1em}
  #board .line.show{opacity:1;transform:none}
  #board .line.note{font-style:italic;font-size:1.08rem;color:#CBD8C6}
  #board .katex{color:var(--chalk)}
  /* ---- controls: pinned to the bottom of the window, always visible ---- */
  .controls{position:sticky;bottom:0;z-index:60;display:flex;align-items:center;gap:10px;
    padding:10px 22px;flex-wrap:wrap;background:#EFE7D8;border-top:1px solid #D9CDB4;
    box-shadow:0 -3px 10px rgba(0,0,0,.07)}
  .controls-inner{display:flex;align-items:center;gap:10px;flex-wrap:wrap;max-width:1460px;margin:0 auto;width:100%}
  .controls button{font-family:inherit;font-size:.95rem;padding:8px 16px;border-radius:8px;cursor:pointer;
    border:1px solid var(--accent-dk);background:#fff;color:var(--ink);transition:.15s}
  .controls button:hover{background:#F3E7D2}
  .controls button.primary{background:var(--accent);color:#fff;font-weight:bold;min-width:96px}
  .controls button.primary:hover{background:var(--accent-dk)}
  .controls .stepinfo{margin-left:auto;font-size:.9rem;opacity:.75}
  .controls .voice.on{background:var(--board);color:var(--chalk)}
  /* ---- professor animation ---- */
  #armL,#armR{transition:transform .5s cubic-bezier(.34,1.4,.64,1)}
  #armL{transform-origin:74px 200px} #armR{transform-origin:146px 200px}
  .pose-point #armR{transform:rotate(-118deg)}
  .pose-write #armR{transform:rotate(-62deg)}
  .pose-think #armR{transform:rotate(-152deg)}
  .pose-excited #armR{transform:rotate(-146deg)}
  .pose-excited #armL{transform:rotate(146deg)}
  #brows{transition:transform .3s}
  .pose-excited #brows,.pose-think #brows{transform:translateY(-4px)}
  #mouth{transform-box:fill-box;transform-origin:center}
  .talking #mouth{animation:talk .28s infinite alternate}
  @keyframes talk{from{transform:scaleY(.55)}to{transform:scaleY(2.4)}}
  #lids{transform-box:fill-box;transform-origin:center top;transform:scaleY(0);animation:blink 4.2s infinite}
  @keyframes blink{0%,95.5%,100%{transform:scaleY(0)}97.5%{transform:scaleY(1)}}
  #hairG{animation:sway 5s ease-in-out infinite;transform-origin:110px 70px}
  @keyframes sway{0%,100%{transform:rotate(-.6deg)}50%{transform:rotate(.6deg)}}
  @media (max-width:820px){.wrap{grid-template-columns:1fr}.prof-col{flex-direction:row;align-items:flex-start}
    .prof-box svg{width:130px;height:auto}.bubble{flex:1}.bubble:after{left:-14px;bottom:22px;
    border:8px solid transparent;border-right-color:var(--accent-dk)}
    .stage-row{flex-direction:column}#stagebox{flex:auto}}
</style>

  <div class="main-col">

<script>
/* ================================================================
   STEP ENGINE — shared across all tutorials (copy from TEMPLATE)
   ================================================================ */
const SVGNS = 'http://www.w3.org/2000/svg';
const $ = id => document.getElementById(id);
const stage = $('stage'), board = $('board'), bubble = $('bubble');

function el(tag, attrs, parent){
  const e = document.createElementNS(SVGNS, tag);
  for (const k in attrs){
    let v = attrs[k];
    if (tag==='text' && k==='font-size') v = Math.round(v*1.15*10)/10;  /* global sketch-font bump */
    e.setAttribute(k, v);
  }
  if (parent) parent.appendChild(e);
  return e;
}

/* --- world→screen mapper: stage is 600×400 --- */
function makeMapper(w){
  const W=600, H=400, p=w.pad ?? 44;
  const sx=(W-2*p)/(w.x1-w.x0), sy=(H-2*p)/(w.y1-w.y0);
  const s = Math.min(sx, sy);
  const cx=(w.x0+w.x1)/2, cy=(w.y0+w.y1)/2;
  if (w.aniso) return { X:x=>300+(x-cx)*sx, Y:y=>200-(y-cy)*sy, s };  /* graphs: fill the stage */
  return { X:x=>300+(x-cx)*s, Y:y=>200-(y-cy)*s, s };                 /* diagrams: true aspect */
}

/* --- animation manager (respects instant mode) --- */
const running = [];
function cancelAnims(){ running.forEach(id=>cancelAnimationFrame(id)); running.length=0; }
function tween(draw, dur, instant, done){
  if (instant){ draw(1); if(done) done(); return; }
  const t0 = performance.now();
  function frame(t){
    let u = Math.min(1,(t-t0)/dur);
    draw(1-Math.pow(1-u,3));            // ease-out cubic
    if (u<1){ running.push(requestAnimationFrame(frame)); } else if (done) done();
  }
  running.push(requestAnimationFrame(frame));
}

/* --- drawing helpers --- */
function headPts(x,y,ang,s){
  return [[x,y],[x-s*Math.cos(ang-0.42),y-s*Math.sin(ang-0.42)],
          [x-s*Math.cos(ang+0.42),y-s*Math.sin(ang+0.42)]]
         .map(p=>p.join(',')).join(' ');
}
/* animated vector arrow in world coords */
function arrow(ctx, x1,y1,x2,y2, opt={}){
  const {svg,M,instant} = ctx;
  const g = el('g',{},svg);
  const X1=M.X(x1),Y1=M.Y(y1),X2=M.X(x2),Y2=M.Y(y2);
  const ang = Math.atan2(Y2-Y1,X2-X1), hs = opt.head ?? 11;
  const line = el('line',{x1:X1,y1:Y1,x2:X1,y2:Y1,stroke:opt.color||'#333',
    'stroke-width':opt.w||3.5,'stroke-linecap':'round',
    ...(opt.dash?{'stroke-dasharray':opt.dash}:{})},g);
  const head = el('polygon',{fill:opt.color||'#333',points:headPts(X1,Y1,ang,hs)},g);
  tween(u=>{
    const x=X1+(X2-X1)*u, y=Y1+(Y2-Y1)*u;
    line.setAttribute('x2',x); line.setAttribute('y2',y);
    head.setAttribute('points',headPts(x,y,ang,hs));
  }, opt.dur||800, instant);
  if (opt.label){
    /* Place the label ADJACENT to the arrow, never on it: offset the
       midpoint perpendicular to the arrow's direction (upper side by
       default; pass side:-1 for the other side; dx/dy fine-tune). */
    const t0 = opt.lt ?? 0.55;
    const mx = X1+(X2-X1)*t0, my = Y1+(Y2-Y1)*t0;
    const L  = Math.hypot(X2-X1, Y2-Y1) || 1;
    let nx = -(Y2-Y1)/L, ny = (X2-X1)/L;        /* unit normal to the arrow */
    if (ny > 0){ nx = -nx; ny = -ny; }          /* prefer the upper side */
    if (opt.side === -1){ nx = -nx; ny = -ny; }
    const fs  = opt.fs || 19;
    /* clearance grows with label width when the offset is horizontal,
       so wide labels (e.g. "3.00 km") clear vertical arrows too */
    const off = opt.off ?? (fs*0.95 + Math.abs(nx)*(String(opt.label).length*fs*0.28));
    const lx = mx+nx*off+(opt.dx??0), ly = my+ny*off+(opt.dy??0)+fs*0.34;
    const lg = el('g',{},g);
    const t = el('text',{x:lx, y:ly, fill:opt.color||'#333','font-size':fs,'text-anchor':'middle',
      'font-style':'italic','font-family':'Georgia,serif','font-weight':'bold'},lg);
    t.textContent = opt.label;
    if (opt.vec){  /* proper vector notation: draw an arrow accent over the symbol */
      const hw = String(opt.label).length*fs*0.28, ay = ly - fs*0.98;
      el('line',{x1:lx-hw, y1:ay, x2:lx+hw*0.7, y2:ay,
        stroke:opt.color||'#333','stroke-width':1.6,'stroke-linecap':'round'},lg);
      el('polygon',{fill:opt.color||'#333', points:headPts(lx+hw, ay, 0, 6)},lg);
    }
    if(!instant){ lg.setAttribute('opacity',0); tween(u=>lg.setAttribute('opacity',u),400,false); }
  }
  return g;
}
/* animated angle arc (angles in degrees, world coords center) */
function arc(ctx, cx,cy,r, a1,a2, opt={}){
  const {svg,M,instant} = ctx;
  const g = el('g',{},svg);
  const path = el('path',{fill:'none',stroke:opt.color||'#666','stroke-width':opt.w||2},g);
  const R = r*M.s;
  function d(a2c){
    const A1=a1*Math.PI/180, A2=a2c*Math.PI/180;
    const x1=M.X(cx)+R*Math.cos(A1), y1=M.Y(cy)-R*Math.sin(A1);
    const x2=M.X(cx)+R*Math.cos(A2), y2=M.Y(cy)-R*Math.sin(A2);
    const large = Math.abs(a2c-a1)>180?1:0, sweep = a2c>a1?0:1;
    return `M${x1},${y1} A${R},${R} 0 ${large} ${sweep} ${x2},${y2}`;
  }
  tween(u=>path.setAttribute('d', d(a1+(a2-a1)*u)), opt.dur||700, instant);
  if (opt.label){
    const mid=(a1+a2)/2*Math.PI/180, LR=R+(opt.lr??18);
    const t=el('text',{x:M.X(cx)+LR*Math.cos(mid),y:M.Y(cy)-LR*Math.sin(mid)+5,
      fill:opt.color||'#666','font-size':16,'font-style':'italic',
      'font-family':'Georgia,serif','text-anchor':'middle'},g);
    t.textContent=opt.label;
  }
  return g;
}
function label(ctx, x,y, txt, opt={}){
  const g = el('g',{},ctx.svg);
  const lx = ctx.M.X(x)+(opt.dx||0), ly = ctx.M.Y(y)+(opt.dy||0), fs = opt.fs||15;
  const t = el('text',{x:lx, y:ly, fill:opt.color||'#444','font-size':fs,'font-family':'Georgia,serif',
    'text-anchor':opt.anchor||'start',...(opt.italic?{'font-style':'italic'}:{})},g);
  t.textContent = txt;
  if (opt.vec){  /* arrow accent over the symbol (assumes short symbol text) */
    const hw = String(txt).length*fs*0.28;
    const cx = opt.anchor==='middle' ? lx : lx+hw;
    const ay = ly - fs*0.95;
    el('line',{x1:cx-hw, y1:ay, x2:cx+hw*0.7, y2:ay,
      stroke:opt.color||'#444','stroke-width':1.5,'stroke-linecap':'round'},g);
    el('polygon',{fill:opt.color||'#444', points:headPts(cx+hw, ay, 0, 5.5)},g);
  }
  if(!ctx.instant){ g.setAttribute('opacity',0); tween(u=>g.setAttribute('opacity',u),400,false); }
  return t;
}
function dashLine(ctx, x1,y1,x2,y2, opt={}){
  const {M}=ctx;
  const l = el('line',{x1:M.X(x1),y1:M.Y(y1),x2:M.X(x2),y2:M.Y(y2),
    stroke:opt.color||'#999','stroke-width':opt.w||1.6,'stroke-dasharray':opt.dash||'5,4'},ctx.svg);
  if(!ctx.instant){ l.setAttribute('opacity',0); tween(u=>l.setAttribute('opacity',u),500,false); }
  return l;
}
/* standard 2-D axes with grid */
function axes2D(svg, M, w, opt={}){
  const g = el('g',{},svg);
  if (opt.grid){
    for(let x=Math.ceil(w.x0); x<=w.x1; x+=opt.grid)
      el('line',{x1:M.X(x),y1:M.Y(w.y0),x2:M.X(x),y2:M.Y(w.y1),stroke:'#E3D9C2','stroke-width':1},g);
    for(let y=Math.ceil(w.y0); y<=w.y1; y+=opt.grid)
      el('line',{x1:M.X(w.x0),y1:M.Y(y),x2:M.X(w.x1),y2:M.Y(y),stroke:'#E3D9C2','stroke-width':1},g);
  }
  const ax = el('line',{x1:M.X(w.x0),y1:M.Y(0),x2:M.X(w.x1),y2:M.Y(0),stroke:'#B0A488','stroke-width':1.8},g);
  const ay = el('line',{x1:M.X(0),y1:M.Y(w.y0),x2:M.X(0),y2:M.Y(w.y1),stroke:'#B0A488','stroke-width':1.8},g);
  el('polygon',{points:headPts(M.X(w.x1),M.Y(0),0,9),fill:'#B0A488'},g);
  el('polygon',{points:headPts(M.X(0),M.Y(w.y1),-Math.PI/2,9),fill:'#B0A488'},g);
  const tx=el('text',{x:M.X(w.x1)-4,y:M.Y(0)+18,fill:'#8A7D60','font-size':15,'font-style':'italic','font-family':'Georgia,serif'},g); tx.textContent=opt.xlab||'x';
  const ty=el('text',{x:M.X(0)+8,y:M.Y(w.y1)+8,fill:'#8A7D60','font-size':15,'font-style':'italic','font-family':'Georgia,serif'},g); ty.textContent=opt.ylab||'y';
  return g;
}
/* oblique 3-D projection: world (x,y,z) → planar 2-D */
const proj = (x,y,z) => [ -0.6*x + y, -0.5*x + z ];
function axes3D(svg, M, ext, opt={}){
  const g = el('g',{},svg);
  const A = [[ext.x,0,0,'x'],[0,ext.y,0,'y'],[0,0,ext.z,'z']];
  for (const [x,y,z,name] of A){
    const [px,py]=proj(x,y,z);
    const X2=M.X(px), Y2=M.Y(py), X1=M.X(0), Y1=M.Y(0);
    el('line',{x1:X1,y1:Y1,x2:X2,y2:Y2,stroke:'#B0A488','stroke-width':1.8},g);
    el('polygon',{points:headPts(X2,Y2,Math.atan2(Y2-Y1,X2-X1),9),fill:'#B0A488'},g);
    const t=el('text',{x:X2+8,y:Y2+4,fill:'#8A7D60','font-size':15,'font-style':'italic','font-family':'Georgia,serif'},g);
    t.textContent=name;
  }
  return g;
}

/* --- KaTeX board --- */
const KX_MACROS = {'\\ihat':'\\hat{\\imath}','\\jhat':'\\hat{\\jmath}','\\khat':'\\hat{k}'};
function addBoardLine(item, animate){
  const div = document.createElement('div');
  div.className = 'line' + (item.t !== undefined ? ' note' : '');
  if (item.t !== undefined) div.textContent = item.t;
  else if (window.katex){
    try { katex.render(item, div, {throwOnError:false, macros:KX_MACROS}); }
    catch(e){ div.textContent = item; }
  } else div.textContent = item;  /* offline fallback: raw LaTeX */
  board.appendChild(div);
  requestAnimationFrame(()=> setTimeout(()=>div.classList.add('show'), animate?60:0));
}

/* --- professor: poses, speech, TTS --- */
const prof = $('prof');
function setPose(p){
  prof.className.baseVal = '';
  prof.classList.add('pose-'+(p||'talk'));
}
/* --- voice selection: smooth, soothing British English (en-GB).
       IMPORTANT: browsers (Chrome especially) load voices late and can
       invalidate cached voice objects, silently reverting to the default
       voice. So we re-select a fresh voice on EVERY utterance. --- */
function britishVoice(){
  const vs = speechSynthesis.getVoices();
  return vs.find(v=>/en[-_]GB/i.test(v.lang) && /daniel|arthur|oliver|james|male/i.test(v.name))
      || vs.find(v=>/en[-_]GB/i.test(v.lang) && /google/i.test(v.name))
      || vs.find(v=>/en[-_]GB/i.test(v.lang))
      || vs.find(v=>/en[-_]AU/i.test(v.lang))
      || null;
}
if ('speechSynthesis' in window){
  speechSynthesis.getVoices();                       /* trigger async load */
  speechSynthesis.onvoiceschanged = ()=>britishVoice();
}
let typeTimer=null, voiceOn=true, utter=null, ttsKeepAlive=null;   /* voice ON by default */
let sentQueue=[], sentIdx=0, speakGen=0;   /* sentence queue: the professor pauses at full stops */
function speakNext(gen){
  if (gen!==speakGen || !state.playing) return;       /* stale chain, or user paused in a gap */
  if (sentIdx >= sentQueue.length){ queueAdvance(1200); return; }
  const u = new SpeechSynthesisUtterance(sentQueue[sentIdx++].trim());
  const v = britishVoice();                            /* fresh pick every time */
  if (v){ u.voice = v; u.lang = v.lang; } else u.lang = 'en-GB';
  u.rate = 0.92; u.pitch = 1.0;                        /* measured lecture pace */
  u.onend = ()=>{ clearInterval(ttsKeepAlive); setTimeout(()=>speakNext(gen), 420); };  /* the breath after a period */
  u.onerror = u.onend;
  utter = u;
  speechSynthesis.speak(u);
  clearInterval(ttsKeepAlive);
  ttsKeepAlive = setInterval(()=>{                     /* Chrome stalls on long utterances unless nudged */
    if (!speechSynthesis.speaking) clearInterval(ttsKeepAlive);
    else { speechSynthesis.pause(); speechSynthesis.resume(); }
  }, 12000);
}
/* bubble display: real greek letters instead of spelled-out phonetics */
function greekify(t){
  return t
   .replace(/\bdelta-([a-zA-Z])/g,'\u0394$1')
   .replace(/\bDelta-([a-zA-Z])/g,'\u0394$1')
   .replace(/\bh-bar\b/gi,'\u0127')
   .replace(/\bepsilon-nought\b/gi,'\u03b5\u2080').replace(/\bmu-nought\b/gi,'\u03bc\u2080')
   .replace(/\bomega-nought\b/gi,'\u03c9\u2080').replace(/\blambda-nought\b/gi,'\u03bb\u2080')
   .replace(/\btheta-nought\b/gi,'\u03b8\u2080')
   .replace(/\bmu-s\b/g,'\u03bc\u209b').replace(/\bmu-k\b/g,'\u03bc\u2096')
   .replace(/\b[Aa]lpha\b/g,'\u03b1').replace(/\b[Bb]eta\b/g,'\u03b2')
   .replace(/\b[Gg]amma\b/g,'\u03b3').replace(/\b[Dd]elta\b/g,'\u03b4')
   .replace(/\b[Tt]heta\b/g,'\u03b8').replace(/\b[Kk]appa\b/g,'\u03ba')
   .replace(/\b[Ll]ambda\b/g,'\u03bb').replace(/\b[Ss]igma\b/g,'\u03c3')
   .replace(/\b[Oo]mega\b/g,'\u03c9').replace(/\b[Pp]si\b/g,'\u03c8')
   .replace(/\b[Pp]hi\b/g,'\u03c6').replace(/\b[Tt]au\b/g,'\u03c4')
   .replace(/\b[Rr]ho\b/g,'\u03c1').replace(/\bepsilon\b/g,'\u03b5')
   .replace(/\bmu\b/g,'\u03bc').replace(/\bpi\b/g,'\u03c0');
}
function speak(text, animate){
  clearInterval(typeTimer);
  speakGen++; sentQueue=[]; sentIdx=0;                 /* invalidate any pending sentence chain */
  if ('speechSynthesis' in window && speechSynthesis.paused) speechSynthesis.resume();  /* unstick before cancel */
  speechSynthesis.cancel();
  prof.classList.add('talking');
  const shown = greekify(text);
  if (!animate){ bubble.textContent=shown; prof.classList.remove('talking'); return; }
  bubble.textContent='';
  let i=0;
  typeTimer = setInterval(()=>{
    bubble.textContent = shown.slice(0,++i);
    if (i>=shown.length){ clearInterval(typeTimer); prof.classList.remove('talking'); }
  },16);
  if (voiceOn && state.playing && 'speechSynthesis' in window){   /* speak only during playback — never on load or manual browsing */
    /* smooth the text for spoken delivery: soften dashes, ellipses, symbols */
    const spoken = text
      .replace(/[°]/g,' degrees ')
      .replace(/\s*[—–]\s*/g,', ')
      .replace(/\.\.\./g,',')
      .replace(/\s*;\s*/g, ', ')                                 /* semicolons read as gentle pauses */
      .replace(/\s*:\s+/g, ', ')                                 /* colons flow as commas, not full stops */
      .replace(/\bk-hat\b/gi,'k hat')
      .replace(/\bg\b/g,'gee')                                   /* standalone g = gravity, not grams */
      .replace(/\bpsi\b/gi,'sigh')                               /* ψ rhymes with pie, not 'p-see' */
      .replace(/(\d)\.(\d)/g,'$1 point $2')                       /* 16.9 -> 'sixteen point nine', no pause */
      .replace(/coulomb/gi, m => (m[0]==='C'?'K':'k')+'oolom');  /* pronounce Coulomb correctly (koo-lom) */
    /* split into sentences: one utterance each, with a breath between them */
    sentQueue = spoken.match(/.+?[.!?]+(?=\s|$)|.+$/g) || [spoken];
    sentIdx = 0;
    /* small delay after cancel() — Chrome otherwise falls back to default voice */
    const gen = speakGen;
    setTimeout(()=>speakNext(gen), 60);
  }
}

/* --- playback state --- */
const state = {ex:0, step:0, playing:false, timer:null, pendingNext:false};
function queueAdvance(ms){
  clearTimeout(state.timer);
  let stalled = 0;   /* guards against TTS engines that never start speaking */
  state.timer = setTimeout(function tick(){
    /* NEVER advance over active speech — that cuts the professor off
       mid-sentence. If he is still talking, check again shortly. */
    if (voiceOn && 'speechSynthesis' in window && (speechSynthesis.speaking || sentIdx < sentQueue.length)){
      stalled = speechSynthesis.speaking ? 0 : stalled + 1;
      if (stalled < 15){                    /* ~6 s of silence with sentences pending = broken TTS */
        state.timer = setTimeout(tick, 400);
        return;
      }
    }
    const ex = EXAMPLES[state.ex];
    if (state.step < ex.steps.length-1){ state.step++; renderStep(true); }
    else { setPlaying(false); showNextLink(); }  /* end of example: STOP and offer the next one */
  }, ms);
}
/* label for entry i — entry 0 may be a Concept Review carrying tab:'Concept Review' */
function exLabel(i){
  return EXAMPLES[i].tab || ('Example ' + (i + 1 - (EXAMPLES[0].tab ? 1 : 0)));
}
/* highlighted link in the speech bubble → loads the next example PAUSED (user presses Play) */
function showNextLink(){
  /* finish the bubble typing first — otherwise its ticks overwrite the link */
  clearInterval(typeTimer);
  bubble.textContent = EXAMPLES[state.ex].steps[state.step].say;
  prof.classList.remove('talking');
  if (state.ex >= EXAMPLES.length-1){
    const d = document.createElement('div');
    d.className = 'next-link';
    d.style.animation = 'none';
    d.textContent = 'Tutorial complete ✓';
    bubble.appendChild(d);
    return;
  }
  const a = document.createElement('div');
  a.className = 'next-link';
  a.textContent = 'Continue to ' + exLabel(state.ex+1) + ' ▸';
  a.onclick = ()=> loadExample(state.ex+1, true);   /* clicking through starts playback automatically */
  bubble.appendChild(a);
}
/* ---- declutter: keep every sketch label visible and collision-free ----
   Runs after each render. Fixes, in order: labels crossing arrow/line shafts,
   label-on-label overlaps, and labels clipped outside the 600x400 viewBox. */
function declutter(svg){
  const W=600, H=400, PAD=3;
  const texts=[...svg.querySelectorAll('text')].filter(t=>t.textContent.trim());
  if(!texts.length) return;
  const items=texts.map(t=>{
    let b; try{ b=t.getBBox(); }catch(e){ return null; }
    return {t, x:b.x, y:b.y, w:b.width, h:b.height, dx:0, dy:0};
  }).filter(Boolean);
  const lines=[...svg.querySelectorAll('line')].map(l=>({
    x1:+l.getAttribute('x1'), y1:+l.getAttribute('y1'),
    x2:+l.getAttribute('x2'), y2:+l.getAttribute('y2'), el:l}))
    .filter(l=>Math.hypot(l.x2-l.x1,l.y2-l.y1)>30);
  const box=it=>({x:it.x+it.dx, y:it.y+it.dy, w:it.w, h:it.h});
  /* --- pass 1: push labels off long straight shafts (arrows, dashed guides) --- */
  for(const it of items){
    for(const L of lines){
      if(L.el.parentNode===it.t.parentNode) continue;      /* its own accent line */
      const b=box(it), cx=b.x+b.w/2, cy=b.y+b.h/2;
      /* distance from bbox centre to the segment */
      const vx=L.x2-L.x1, vy=L.y2-L.y1, len2=vx*vx+vy*vy||1;
      let u=((cx-L.x1)*vx+(cy-L.y1)*vy)/len2; u=Math.max(0,Math.min(1,u));
      const px=L.x1+u*vx, py=L.y1+u*vy;
      const dx=cx-px, dy=cy-py, d=Math.hypot(dx,dy);
      const clear=Math.min(b.h*0.55, 14);                   /* how close counts as a hit */
      if(d<clear && px>b.x+b.w*0.12 && px<b.x+b.w*0.88){
        const need=clear-d+3;
        if(d>0.5){ it.dx+=dx/d*Math.min(need,18); it.dy+=dy/d*Math.min(need,18); }
        else it.dy-=Math.min(need,18);
      }
    }
  }
  /* --- pass 2: separate overlapping labels (direction-aware, up to 4 sweeps) --- */
  for(let pass=0;pass<4;pass++){
    let moved=false;
    for(let i=0;i<items.length;i++) for(let j=i+1;j<items.length;j++){
      const a=box(items[i]), b=box(items[j]);
      const ox=Math.min(a.x+a.w,b.x+b.w)-Math.max(a.x,b.x);
      const oy=Math.min(a.y+a.h,b.y+b.h)-Math.max(a.y,b.y);
      if(ox>4 && oy>3){
        if(ox<=oy){                                          /* separate along the smaller overlap */
          let dir=(b.x+b.w/2 >= a.x+a.w/2) ? 1 : -1;
          const nx=b.x+dir*(ox+PAD);
          if(nx<PAD) dir=1; else if(nx+b.w>W-PAD) dir=-1;
          items[j].dx+=dir*(ox+PAD);
        } else {
          const dir=(b.y+b.h/2 >= a.y+a.h/2) ? 1 : -1;      /* push j AWAY from i */
          const ny=b.y+dir*(oy+PAD);
          if(dir>0 ? ny+b.h<=H-PAD : ny>=PAD){
            items[j].dy+=dir*(oy+PAD);
          } else {                                          /* j pinned at the edge: move i instead */
            const di=-dir, niy=a.y+di*(oy+PAD);
            if(di>0 ? niy+a.h<=H-PAD : niy>=PAD) items[i].dy+=di*(oy+PAD);
            else items[j].dy+=dir*(oy+PAD);
          }
        }
        moved=true;
      }
    }
    if(!moved) break;
  }
  /* --- pass 3: clamp everything into the viewBox so axis labels stay visible --- */
  for(const it of items){
    const b=box(it);
    if(b.x<PAD) it.dx+=PAD-b.x;
    if(b.x+b.w>W-PAD) it.dx-=b.x+b.w-(W-PAD);
    if(b.y<PAD) it.dy+=PAD-b.y;
    if(b.y+b.h>H-PAD) it.dy-=b.y+b.h-(H-PAD);
  }
  /* apply: move the label's own group (keeps vector accents attached) or the text */
  for(const it of items){
    if(Math.abs(it.dx)<0.6 && Math.abs(it.dy)<0.6) continue;
    const par=it.t.parentNode;
    const target=(par && par.tagName==='g' && par.querySelectorAll('text').length===1
                  && par.childNodes.length<=3) ? par : it.t;
    const prev=target.getAttribute('transform')||'';
    target.setAttribute('transform', prev+` translate(${it.dx.toFixed(1)} ${it.dy.toFixed(1)})`);
  }
}

function renderStep(animate){
  cancelAnims(); clearTimeout(state.timer);
  const ex = EXAMPLES[state.ex];
  /* stage: rebuild — past steps instant, current step animated */
  stage.innerHTML='';
  const M = makeMapper(ex.world);
  ex.setup({svg:stage, M, instant:true}, ex.world);
  /* Concept Reviews present one sketch at a time — each diagram appears as
     its topic comes up, never stacked on its predecessors. Examples accumulate.
     A review step marked solo:true clears the stage entirely and presents its
     own diagram alone — a fresh slide rather than an annotation. */
  const curStep = ex.steps[state.step];
  if (ex.tab && curStep.solo){ stage.innerHTML=''; }
  const seqStart = ex.tab ? state.step : 0;
  for (let i=seqStart;i<=state.step;i++){
    const st = ex.steps[i];
    if (st.action) st.action({svg:stage, M, instant: i<state.step || !animate});
  }
  declutter(stage);                       /* keep labels visible and collision-free */
  /* board: cumulative */
  board.innerHTML='';
  for (let i=0;i<=state.step;i++)
    (ex.steps[i].board||[]).forEach(b=>addBoardLine(b, animate && i===state.step));
  $('boardwrap').scrollTop = $('boardwrap').scrollHeight;
  /* professor */
  const st = ex.steps[state.step];
  setPose(st.pose);
  speak(st.say, animate);
  $('stepinfo').textContent = `Step ${state.step+1} of ${ex.steps.length}`;
  /* auto-advance: ALWAYS schedule a timed advance while playing.
     With voice on, the utterance's onend advances sooner; this timer is
     the fallback so playback never stalls if speech fails to fire. */
  if (state.playing){
    const ms = voiceOn ? Math.max(5200, st.say.length*88)
                       : Math.max(4000, st.say.length*70);
    queueAdvance(ms);
  }
}
function loadExample(i, autoplay){
  state.ex=i; state.step=0; state.pendingNext=false;
  const ex = EXAMPLES[i];
  const simChip = ex.sim ? ` <a class="simlink" href="${ex.sim.url}" target="_blank" rel="noopener">&#129518; Desmos: ${ex.sim.label} &#9656;</a>` : '';
  $('prompt').innerHTML = `<b>${exLabel(i)}.</b> ${ex.title}
     <span class="diff ${ex.diff.toLowerCase()}">${ex.diff}</span>${simChip}<br>${ex.prompt}`;
  document.querySelectorAll('#tabs button').forEach((b,j)=>b.classList.toggle('active', j===i));
  setPlaying(!!autoplay);
  renderStep(true);
}
function setPlaying(p){
  state.playing=p;
  $('btnPlay').innerHTML = p ? '&#9646;&#9646; Pause' : '&#9654; Play';
  if (!p){ clearTimeout(state.timer); }
}
/* --- controls --- */
$('btnPlay').onclick = ()=>{
  if (state.playing){
    /* PAUSE: freeze speech and auto-advance exactly where they stand */
    setPlaying(false);
    clearInterval(ttsKeepAlive);                        /* keep-alive would un-pause the audio */
    if ('speechSynthesis' in window && speechSynthesis.speaking && !speechSynthesis.paused)
      speechSynthesis.pause();                          /* hold mid-sentence — do NOT cancel */
  } else {
    const ex=EXAMPLES[state.ex];
    if ('speechSynthesis' in window && speechSynthesis.paused && speechSynthesis.speaking){
      /* RESUME: continue from the very word where he was paused */
      setPlaying(true);
      speechSynthesis.resume();
      clearInterval(ttsKeepAlive);
      ttsKeepAlive = setInterval(()=>{
        if (!speechSynthesis.speaking) clearInterval(ttsKeepAlive);
        else { speechSynthesis.pause(); speechSynthesis.resume(); }
      }, 12000);
      /* fallback advance re-armed; queueAdvance never cuts active speech */
      queueAdvance(voiceOn ? Math.max(5200, ex.steps[state.step].say.length*88) : 4000);
    } else if (voiceOn && sentIdx < sentQueue.length && 'speechSynthesis' in window && !speechSynthesis.speaking){
      /* paused between sentences: pick the narration up at the next sentence */
      setPlaying(true);
      speakNext(speakGen);
      queueAdvance(Math.max(5200, ex.steps[state.step].say.length*88));
    } else if (state.step===ex.steps.length-1 && !speechSynthesis.speaking
               && (!voiceOn || (sentQueue.length && sentIdx>=sentQueue.length))){
      state.step=0;                                     /* finished example: replay from start */
      setPlaying(true);
      renderStep(true);
    } else if (voiceOn && sentQueue.length && sentIdx>=sentQueue.length){
      /* this step's narration already finished: continue forward */
      setPlaying(true);
      queueAdvance(1200);
    } else {
      /* step not yet narrated (fresh page load or manual browsing):
         start it properly — animation AND voice from the first word */
      setPlaying(true);
      renderStep(true);
    }
  }
};
$('btnNext').onclick = ()=>{ setPlaying(false); state.pendingNext=false;
  const ex=EXAMPLES[state.ex];
  if (state.step<ex.steps.length-1){ state.step++; renderStep(true); } };
$('btnPrev').onclick = ()=>{ setPlaying(false); state.pendingNext=false;
  if (state.step>0){ state.step--; renderStep(false); } };
$('btnRestart').onclick = ()=>{ setPlaying(false); state.pendingNext=false; state.step=0; renderStep(true); };
$('btnVoice').onclick = function(){
  voiceOn=!voiceOn; this.classList.toggle('on',voiceOn);
  this.innerHTML = voiceOn?'&#128266; Voice: on':'&#128266; Voice: off';
  if(!voiceOn){ speakGen++; sentQueue=[]; sentIdx=0; speechSynthesis.cancel(); }
};
document.addEventListener('keydown',e=>{
  if (e.key==='ArrowRight') $('btnNext').click();
  if (e.key==='ArrowLeft') $('btnPrev').click();
  if (e.key===' '){ e.preventDefault(); $('btnPlay').click(); }
});

const RED='#C0392B', BLUE='#2E6DA4', GREEN='#2E7D4F', PURPLE='#7B4FA0', GOLD='#B5793B';

function boxAt(c, x, y, w, h, opt={}){
  const {M}=c; const px=M.X(x-w/2), py=M.Y(y+h);
  const r=el('rect',{x:px,y:py,width:M.X(x+w/2)-px,height:M.Y(y)-py,
    fill:opt.fill||'#C98F52',stroke:opt.stroke||'#8A5A24','stroke-width':2,rx:3},c.svg);
  if(!c.instant){r.setAttribute('opacity',0);tween(u=>r.setAttribute('opacity',u),400,false);}
  return r;
}
function ground(c, x0, x1, y){
  el('line',{x1:c.M.X(x0),y1:c.M.Y(y),x2:c.M.X(x1),y2:c.M.Y(y),stroke:'#B0A488','stroke-width':3},c.svg);
}
function textAt(c, x, y, txt, opt={}){
  const t=el('text',{x:c.M.X(x)+(opt.dx||0),y:c.M.Y(y)+(opt.dy||0),fill:opt.color||'#8A7D60',
    'font-size':opt.fs||13,'font-family':'Georgia,serif','text-anchor':opt.anchor||'start',
    ...(opt.italic?{'font-style':'italic'}:{})},c.svg);
  t.textContent=txt;
  if(!c.instant){t.setAttribute('opacity',0);tween(u=>t.setAttribute('opacity',u),400,false);}
  return t;
}
function plotCurve(c, fn, t0, t1, opt={}){
  const {svg,M,instant}=c; const N=opt.N||120;
  const pl=el('polyline',{fill:'none',stroke:opt.color||'#333','stroke-width':opt.w||3,
    'stroke-linejoin':'round','stroke-linecap':'round',...(opt.dash?{'stroke-dasharray':opt.dash}:{})},svg);
  const pts=[]; for(let i=0;i<=N;i++){const t=t0+(t1-t0)*i/N; const q=fn(t); pts.push(M.X(q[0])+','+M.Y(q[1]));}
  tween(u=>pl.setAttribute('points', pts.slice(0, Math.max(2, Math.round(u*pts.length))).join(' ')), opt.dur||1100, instant);
  return pl;
}
function markPoint(c, x, y, txt, opt={}){
  const g=el('g',{},c.svg);
  el('circle',{cx:c.M.X(x),cy:c.M.Y(y),r:5,fill:opt.color||PURPLE},g);
  const t=el('text',{x:c.M.X(x)+(opt.dx??10),y:c.M.Y(y)+(opt.dy??-10),fill:opt.color||PURPLE,
    'font-size':14,'font-family':'Georgia,serif','font-style':'italic'},g);
  t.textContent=txt;
  if(!c.instant){g.setAttribute('opacity',0);tween(u=>g.setAttribute('opacity',u),500,false);}
  return g;
}
/* energy bar chart: pairs of [label, value, color], drawn at world (x, 0) upward */
function energyBars(c, x0, bars, scale, opt={}){
  const {M}=c; const g=el('g',{},c.svg); const bw=opt.bw||0.9;
  bars.forEach(([name,val,col],i)=>{
    const x = x0 + i*(bw*1.5);
    const r=el('rect',{x:M.X(x), y:M.Y(val*scale), width:M.X(x+bw)-M.X(x),
      height:Math.max(1, M.Y(0)-M.Y(val*scale)), fill:col, opacity:.75, rx:2},g);
    const t=el('text',{x:M.X(x+bw/2), y:M.Y(0)+15, fill:'#7A6E52','font-size':12,
      'text-anchor':'middle','font-family':'Georgia,serif'},g);
    t.textContent=name;
  });
  if(!c.instant){g.setAttribute('opacity',0);tween(u=>g.setAttribute('opacity',u),600,false);}
  return g;
}
/* vertical spring zigzag from (x,y0) to (x,y1) */
function spring(c, x, y0, y1, coils, wpx){
  const {M}=c; const pts=[]; const N=coils*2+2;
  for(let i=0;i<=N;i++){
    const y = y0+(y1-y0)*i/N;
    const dx = (i===0||i===N) ? 0 : (i%2? wpx : -wpx);
    pts.push((M.X(x)+dx)+','+M.Y(y));
  }
  return el('polyline',{points:pts.join(' '),fill:'none',stroke:'#6B5B3E','stroke-width':2.5,
    'stroke-linejoin':'round'},c.svg);
}

  b.textContent = ex.tab ? ex.tab : `${exLabel(i)} · ${ex.diff}`;
  b.onclick = ()=>loadExample(i,true);   /* switching examples starts playback automatically */
  $('tabs').appendChild(b);
});
loadExample(0,false);                     /* start paused — user clicks Play */
</script>
</body>
</html>
